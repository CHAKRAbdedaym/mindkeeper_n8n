version: '3.8'

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - WEBHOOK_URL=${WEBHOOK_URL}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - postgres
    networks:
      - mindkeeper-net

  postgres:
    image: postgres:16-alpine
    container_name: mindkeeper-db
    environment:
      - POSTGRES_PASSWORD=mindkeeper123
      - POSTGRES_DB=mindkeeper
    volumes:
      - mindkeeper_pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mindkeeper-net

volumes:
  n8n_data:
  mindkeeper_pgdata:

networks:
  mindkeeper-net:
